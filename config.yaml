# ASL Classifier Training Configuration

# Experiment settings
experiment:
  name: "asl_efficientnet_b0"
  seed: 42
  device: "cuda"  # cuda or cpu (auto-detected if cuda not available)

# Data settings
data:
  train_dir: "./input/train"
  valid_dir: "./input/valid"
  test_dir: "./input/test"
  image_size: 128
  num_workers: 4
  pin_memory: true

# Data augmentation
augmentation:
  enabled: true
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter:
    brightness: 0.4
    contrast: 0.4
    saturation: 0.3
    hue: 0.15
  # Advanced augmentation for better generalization
  random_perspective: true
  random_affine: true
  gaussian_blur: true
  random_erasing: true

# Model settings
model:
  architecture: "efficientnet_b0"  # timm model name
  pretrained: true
  dropout_rate: 0.4
  freeze_backbone: true          # Freeze pretrained layers initially
  unfreeze_after_epochs: 5       # Unfreeze backbone after N epochs for fine-tuning

# Training settings
training:
  batch_size: 64
  num_epochs: 25
  learning_rate: 0.0005
  weight_decay: 0.0001

  # Optimizer
  optimizer: "adam"  # adam, sgd, adamw

  # Learning rate scheduler
  scheduler:
    type: "reduce_on_plateau"  # reduce_on_plateau, cosine, step
    patience: 3
    factor: 0.3
    min_lr: 0.00001

  # Early stopping
  early_stopping:
    enabled: true
    patience: 7
    min_delta: 0.0001

# Evaluation settings
evaluation:
  save_confusion_matrix: true
  compute_per_class_metrics: true
  save_predictions: false

# Logging settings
logging:
  log_interval: 10  # batches
  tensorboard: true
  save_dir: "./experiments"
  save_best_model: true
  save_last_model: true
  checkpoint_dir: "./checkpoints"

# Mixed precision training (faster on modern GPUs)
mixed_precision:
  enabled: false  # Set to true if your GPU supports it (recommended)
